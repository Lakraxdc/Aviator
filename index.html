<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Live - Local Feed</title>
    <style>
        body { background: #0a0a0c; color: #00ff66; font-family: 'Courier New', monospace; padding: 20px; }
        .dashboard { max-width: 400px; margin: auto; border: 1px solid #333; padding: 15px; border-radius: 12px; background: #111; box-shadow: 0 0 20px #f03; }
        .header { text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 18px; }
        .red { color: #ff4d4d; }
        .pink { color: #ff00ff; font-weight: bold; text-shadow: 0 0 10px #ff00ff; }
        .info { font-size: 10px; color: #666; word-break: break-all; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div style="font-weight: bold; color: #fff;">LIVE SPRIBE MONITOR</div>
        <div style="font-size: 11px; color: #888;">User: 13638485 | Token: Active</div>
    </div>
    
    <div id="log">Waiting for round...</div>
    
    <div class="info">
        <b>Session Token:</b><br>
        32f1776d-b9ae-46d6-b511-f49d818f21e1
    </div>
</div>

<script>
    const logDiv = document.getElementById('log');
    let lastId = null;

    async function syncData() {
        try {
            // Fetching from the public streamer giveaway endpoint
            const response = await fetch('https://smartigaming.app/api/cdp/streamer/giveaway.json?origin=https%3A%2F%2F1wacxb.com');
            const data = await response.json();
            
            const ids = Object.keys(data);
            const latestId = ids[ids.length - 1];
            const round = data[latestId];

            if (latestId !== lastId) {
                lastId = latestId;
                const val = parseFloat(round.f || round.multiplier).toFixed(2);
                
                // Color Coding
                let type = "";
                if (val < 2.00) type = "red";
                if (val >= 10.00) type = "pink";

                const entry = document.createElement('div');
                entry.className = `row ${type}`;
                entry.innerHTML = `<span>[${new Date().toLocaleTimeString().split(' ')[0]}]</span> <b>${val}x</b>`;
                
                if (logDiv.innerText.includes("Waiting")) logDiv.innerHTML = "";
                logDiv.insertBefore(entry, logDiv.firstChild);
                
                // Keep only last 10 rounds
                if (logDiv.children.length > 10) logDiv.lastChild.remove();
            }
        } catch (err) {
            console.log("Connection lost, retrying...");
        }
    }

    // Check every 2.5 seconds
    setInterval(syncData, 2500);
    syncData();
</script>

</body>
</html>
