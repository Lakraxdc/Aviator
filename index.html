<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator 60-Min Data Hub</title>
    <style>
        body { background: #050505; color: #eee; font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        .header { text-align: center; padding: 15px; border: 1px solid #333; border-radius: 10px; margin-bottom: 20px; background: #111; }
        .hour-block { border: 1px solid #222; border-radius: 10px; margin-bottom: 20px; background: #0a0a0a; overflow: hidden; }
        .hour-header { background: #1a1a1a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .btn-download { background: #00d4ff; color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #151515; font-weight: bold; font-size: 16px; }
        .skyblue { color: #00d4ff; } .purple { color: #a020f0; } .pink { color: #ff00ff; text-shadow: 0 0 8px #ff00ff; }
        .status { font-size: 10px; color: #444; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="font-size: 18px; font-weight: bold;">HOURLY ARCHIVE</div>
            <div style="font-size: 11px; color: #00d4ff;">LIVE TRACKING ID: 13638485</div>
        </div>
        <div id="logs"></div>
        <div class="status" id="sync">ESTABLISHING DATA STREAM...</div>
    </div>

    <script>
        const logsDiv = document.getElementById('logs');
        let lastId = null;
        let hourStorage = {}; // Holds the full hour strings for CSV

        async function startTracking() {
            try {
                // Stable Public API to avoid Token Expiry
                const api = 'https://smartigaming.app/api/cdp/streamer/giveaway.json?origin=https%3A%2F%2F1wacxb.com';
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(api)}&cache=${Date.now()}`);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                
                const ids = Object.keys(data);
                const latestId = ids[ids.length - 1];
                const round = data[latestId];

                if (latestId !== lastId) {
                    lastId = latestId;
                    
                    // Logic to extract multiplier correctly (Fixes NaNx)
                    let rawVal = round.f || round.multiplier || 0;
                    const val = parseFloat(rawVal).toFixed(2);
                    if (val <= 0) return;

                    const now = new Date();
                    const h = now.getHours();
                    const dateStr = now.toLocaleDateString();
                    const timeStr = now.toLocaleTimeString([], { hour12: false });
                    const hourID = `hour-${h}-${dateStr.replace(/\//g, '-')}`;

                    // Create Hour Section if new
                    if (!document.getElementById(hourID)) {
                        hourStorage[hourID] = "Date,Time,Multiplier\n"; // CSV Header
                        const block = document.createElement('div');
                        block.className = 'hour-block';
                        block.id = hourID;
                        block.innerHTML = `
                            <div class="hour-header">
                                <span style="font-size:12px; color:#888;">${h}:00 - ${h+1}:00</span>
                                <button class="btn-download" onclick="exportCSV('${hourID}')">DOWNLOAD FULL HOUR</button>
                            </div>
                            <div class="rows"></div>`;
                        logsDiv.insertBefore(block, logsDiv.firstChild);
                    }

                    // Add to CSV Storage
                    hourStorage[hourID] += `${dateStr},${timeStr},${val}x\n`;

                    // Visual Update
                    let clr = val < 2 ? 'skyblue' : (val < 10 ? 'purple' : 'pink');
                    const row = document.createElement('div');
                    row.className = `row ${clr}`;
                    row.innerHTML = `<span>${timeStr}</span><span>${val}x</span>`;
                    
                    const rowContainer = document.getElementById(hourID).querySelector('.rows');
                    rowContainer.insertBefore(row, rowContainer.firstChild);
                    document.getElementById('sync').innerText = "DATA OK: " + timeStr;
                }
            } catch (e) {
                document.getElementById('sync').innerText = "RE-SYNCING WITH SERVER...";
            }
        }

        function exportCSV(id) {
            const blob = new Blob([hourStorage[id]], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Aviator_${id}.csv`;
            a.click();
        }

        setInterval(startTracking, 3000);
        startTracking();
    </script>
</body>
</html>
